<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title.bookings">حجوزاتي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="platform.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Cairo:wght@400;600;700&display=swap">
    <style>
        .bk-wrap { width: 92%; max-width: 900px; margin: 0 auto; padding: 24px 16px 70px; }
        .bk-card { background: var(--xp-surface); border: 1px solid var(--xp-border); border-radius: 16px; padding: 20px; margin-bottom: 18px; display: grid; gap: 14px; grid-template-columns: 1fr auto; align-items: start; }
        @media (max-width: 640px) { .bk-card { grid-template-columns: 1fr; } }
        .bk-qr { text-align: center; }
        .bk-qr canvas { max-width: 140px; height: auto; }
    </style>
</head>
<body class="xp-page-bg" data-page-title="title.bookings" data-account-page="bookings">
<header>
    <nav class="navigation">
        <a href="index.html" class="nav-logo-link"><img src="img/LOGO.png" class="logo" alt="Xplore Riyadh"></a>
        <div class="navigation-items">
            <a href="index.html" data-i18n="nav.home">الرئيسية</a>
            <a href="Event.html" data-i18n="nav.events">الفعاليات</a>
            <a href="CoffeeShop.html" data-i18n="nav.restaurants">المطاعم والمقاهي</a>
            <a href="Esport.html" data-i18n="nav.sports">الرياضة</a>
            <a href="About us.html" data-i18n="nav.about">من نحن</a>
            <a href="Contact.html" data-i18n="nav.contact">تواصل</a>
        </div>
        <div class="nav-actions">
            <button type="button" class="xp-theme-toggle" id="xpThemeToggle" aria-label="Theme"><i class="fas fa-moon"></i></button>
            <button class="lang-toggle" id="langToggle" onclick="XploreLang.toggle()"><i class="fas fa-globe"></i><span data-i18n="lang.switch">English</span></button>
            <a href="login.html" class="nav-btn-login" id="navLogin"><i class="fas fa-sign-in-alt"></i><span data-i18n="nav.login">دخول</span></a>
            <a href="register.html" class="nav-btn-signup" id="navSignup"><i class="fas fa-user-plus"></i><span data-i18n="nav.signup">تسجيل</span></a>
            <div class="user-menu" id="userMenu">
                <div class="user-avatar" id="userAvatarBtn">
                    <div class="avatar-circle" id="avatarInitials">?</div>
                    <span class="user-name" id="navUserName">User</span>
                    <i class="fas fa-chevron-down chevron"></i>
                </div>
                <div class="user-dropdown">
                    <div class="dropdown-header">
                        <div class="d-name" id="dropName">User</div>
                        <div class="d-email" id="dropEmail"></div>
                    </div>
                    <a href="admin.html" class="dropdown-item" id="navAdminItem" style="display:none"><i class="fas fa-user-shield"></i> <span data-i18n="nav.admin">لوحة التحكم</span></a>
                    <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i> <span data-i18n="nav.profile">ملفي</span></a>
                    <a href="favorites.html" class="dropdown-item"><i class="fas fa-heart"></i> <span data-i18n="nav.favourites">المفضلة</span></a>
                    <a href="bookings.html" class="dropdown-item"><i class="fas fa-ticket-alt"></i> <span data-i18n="nav.bookings">حجوزاتي</span></a>
                    <button type="button" class="dropdown-item logout-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span data-i18n="nav.signout">خروج</span></button>
                </div>
            </div>
        </div>
    </nav>
</header>

<nav class="xp-account-nav" aria-label="Account">
    <a href="profile.html" class="xp-account-tab"><i class="fas fa-user"></i> <span data-i18n="nav.profile">ملفي الشخصي</span></a>
    <a href="favorites.html" class="xp-account-tab"><i class="fas fa-heart"></i> <span data-i18n="nav.favourites">المفضلة</span></a>
    <a href="bookings.html" class="xp-account-tab active"><i class="fas fa-ticket-alt"></i> <span data-i18n="nav.bookings">حجوزاتي</span></a>
</nav>

<main class="bk-wrap">
    <h1 style="font-size:1.6rem;margin-bottom:18px" data-i18n="bookings.heading">حجوزاتي</h1>
    <div id="bkList"></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="lang.js"></script>
<script src="listing-i18n.js"></script>
<script src="supabase-auth.js"></script>
<script src="platform.js"></script>
<script>
(function () {
    function t(k) { return typeof XploreLang !== 'undefined' ? XploreLang.t(k) : k; }
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
    function locTitle(L) {
        if (!L) return t('bookings.item');
        var row = typeof XploreListingI18n !== 'undefined' ? XploreListingI18n.localizeListing(L) : L;
        return row.title || t('bookings.item');
    }

    var bookingRows = [];

    function renderBookings(buyerName) {
        var box = document.getElementById('bkList');
        if (!bookingRows.length) {
            box.innerHTML = '<p class="xp-meta">' + t('bookings.empty') + '</p>';
            return;
        }
        box.innerHTML = '';
        bookingRows.forEach(function (b) {
            var L = b.listings || {};
            var card = document.createElement('div');
            card.className = 'bk-card';
            var title = locTitle(L);
            var st = b.status === 'confirmed' ? t('bookings.statusOk') : t('bookings.statusCancelled');
            var dt = new Date(b.created_at).toLocaleString(document.documentElement.lang === 'ar' ? 'ar-SA' : 'en-GB');
            var qrHost = document.createElement('div');
            qrHost.className = 'bk-qr';
            var qrCanvas = document.createElement('canvas');
            qrHost.appendChild(qrCanvas);
            card.innerHTML =
                '<div><h3 style="margin:0 0 8px">' + esc(title) + '</h3>' +
                '<p class="xp-meta"><strong>' + esc(t('bookings.buyer')) + ':</strong> ' + esc(buyerName) + '</p>' +
                '<p class="xp-meta">' + t('bookings.qty') + ': ' + b.qty + ' · ' + t('bookings.total') + ': ' + Number(b.total_price).toFixed(2) + ' SAR</p>' +
                '<p class="xp-meta">' + t('bookings.status') + ': ' + st + '</p>' +
                '<p class="xp-meta">' + t('bookings.date') + ': ' + dt + '</p>' +
                (b.status === 'confirmed' ? '<button type="button" class="xp-btn xp-btn-ghost bk-cancel" data-id="' + b.id + '">' + t('bookings.cancel') + '</button>' : '') +
                '</div>';
            card.appendChild(qrHost);
            box.appendChild(card);

            if (typeof QRCode !== 'undefined' && b.status === 'confirmed') {
                QRCode.toCanvas(qrCanvas, 'XPLOR-' + b.qr_token, { width: 132, margin: 1, color: { dark: '#1a1030', light: '#ffffff' } }, function () {});
            }

            var cb = card.querySelector('.bk-cancel');
            if (cb) {
                cb.addEventListener('click', async function () {
                    if (!confirm(t('bookings.confirmCancel'))) return;
                    var r = await XplorePlatform.cancelBooking(b.id);
                    if (r.error) XplorePlatform.toast(r.error.message, 'error');
                    else {
                        var d = r.data;
                        if (d && d.ok) { XplorePlatform.toast(t('bookings.cancelled'), 'success'); location.reload(); }
                        else XplorePlatform.toast((d && d.error) || t('platform.err'), 'error');
                    }
                });
            }
        });
    }

    async function init() {
        XploreLang.init();
        document.getElementById('xpThemeToggle').addEventListener('click', function () { XplorePlatform.toggleTheme(); });

        var sess = await XploreAuth.client().auth.getSession();
        if (!sess.data || !sess.data.session) {
            location.replace('login.html?redirect=bookings.html');
            return;
        }

        var buyerName = '';
        try {
            var pr = await XploreAuth.client()
                .from('profiles')
                .select('full_name,email')
                .eq('id', sess.data.session.user.id)
                .maybeSingle();
            if (pr.data) buyerName = pr.data.full_name || pr.data.email || '';
        } catch (e1) {}
        if (!buyerName) {
            var um = sess.data.session.user.user_metadata || {};
            buyerName = um.full_name || sess.data.session.user.email || '';
        }

        var res = await XplorePlatform.myBookings();
        var box = document.getElementById('bkList');
        if (res.error) {
            box.innerHTML = '<p class="xp-meta">' + esc(res.error.message) + '</p>';
            return;
        }
        bookingRows = res.data || [];
        renderBookings(buyerName);

        document.addEventListener('xplore:langchange', function () {
            renderBookings(buyerName);
        });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
</body>
</html>
